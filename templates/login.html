<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 - 登入</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1c3a; --navy-light: #243d6e;
    --accent: #4a7bda; --gold: #c8a96e;
    --bg: #f4f6fa; --text: #1e2a45; --muted: #8892a4;
    --border: #dde3ef; --red: #d64242;
  }
  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(74,123,218,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(200,169,110,0.08) 0%, transparent 55%);
  }
  .login-card {
    position: relative;
    z-index: 1;
    background: #fff;
    border-radius: 12px;
    padding: 48px 40px;
    width: 400px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.35);
  }
  .brand { text-align: center; margin-bottom: 36px; }
  .brand-title { font-size: 22px; font-weight: 700; color: var(--navy); letter-spacing: 0.04em; }
  .brand-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .divider { width: 40px; height: 2px; background: var(--gold); margin: 12px auto; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  input[type="text"], input[type="password"] {
    width: 100%; padding: 12px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text);
    background: var(--bg); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 14px;
  }
  input[type="text"]:focus, input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,123,218,0.12);
    background: #fff;
  }
  .error-msg {
    font-size: 12px; color: var(--red); margin-top: 8px;
    padding: 8px 12px; background: rgba(214,66,66,0.06);
    border-radius: 6px; border-left: 3px solid var(--red);
  }
  button[type="submit"] {
    width: 100%; margin-top: 24px; padding: 13px;
    background: var(--navy); color: #fff; border: none; border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 500;
    cursor: pointer; letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.1s;
  }
  button[type="submit"]:hover { background: var(--navy-light); }
  button[type="submit"]:active { transform: scale(0.98); }
  .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 24px; letter-spacing: 0.05em; }
  .bio-btn {
    width: 100%; padding: 12px; margin-bottom: 16px;
    background: #fff; border: 2px solid var(--accent); border-radius: 8px;
    font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--accent); cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: background 0.2s, transform 0.1s;
  }
  .bio-btn:hover { background: rgba(74,123,218,0.05); }
  .bio-btn:active { transform: scale(0.98); }
  .bio-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .divider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .bio-msg { font-size: 12px; text-align: center; margin-top: 6px; min-height: 16px; }
  .bio-msg.err { color: var(--red); }
  .bio-msg.ok  { color: #2e9e6b; }
  .remember-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: -4px; margin-bottom: 4px;
  }
  .remember-row input[type="checkbox"] {
    width: 16px; height: 16px; margin: 0; cursor: pointer;
    accent-color: var(--accent);
  }
  .remember-row label {
    font-size: 12px; color: var(--muted); margin: 0;
    letter-spacing: 0; text-transform: none; cursor: pointer;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-title">管理後台</div>
    <div class="divider"></div>
    <div class="brand-sub">Management System</div>
  </div>

  <!-- WebAuthn biometric button (shown when supported) -->
  <div id="bio-section" style="display:none">
    <button type="button" class="bio-btn" id="bio-btn" onclick="doBioLogin()">
      <span id="bio-label">指紋 / Face ID 登入</span>
    </button>
    <div class="divider-row">
      <div class="divider-line"></div>
      <span class="divider-text">或使用密碼登入</span>
      <div class="divider-line"></div>
    </div>
  </div>

  <form method="POST" id="login-form">
    <label for="un">管理員帳號</label>
    <input type="text" id="un" name="username" placeholder="輸入帳號" autofocus autocomplete="username" autocapitalize="none">
    <label for="pw">密碼</label>
    <input type="password" id="pw" name="password" placeholder="輸入密碼" autocomplete="current-password">
    <div class="remember-row">
      <input type="checkbox" id="remember-me">
      <label for="remember-me">記住帳號密碼</label>
    </div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <button type="submit">登入</button>
  </form>
  <div class="bio-msg" id="bio-msg"></div>
  <div class="footer-note">打卡 &amp; 排班管理系統</div>
</div>

<script>
// ── WebAuthn helpers ──────────────────────────────────────────────
function b2b64url(buf){
  const b=new Uint8Array(buf);let s='';
  b.forEach(x=>s+=String.fromCharCode(x));
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64url2buf(s){
  const b=s.replace(/-/g,'+').replace(/_/g,'/');
  const bin=atob(b);const u=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);
  return u.buffer;
}
function bioMsg(msg,type){
  const el=document.getElementById('bio-msg');
  el.textContent=msg;el.className='bio-msg'+(type?' '+type:'');
}

// ── Remember me ──────────────────────────────────────────────────
(function(){
  const saved = localStorage.getItem('admin_remember');
  if(saved){
    try{
      const d = JSON.parse(saved);
      document.getElementById('un').value = d.u || '';
      document.getElementById('pw').value = d.p ? atob(d.p) : '';
      document.getElementById('remember-me').checked = true;
    }catch(e){}
  }
})();

document.getElementById('login-form').addEventListener('submit', function(){
  const chk = document.getElementById('remember-me').checked;
  if(chk){
    localStorage.setItem('admin_remember', JSON.stringify({
      u: document.getElementById('un').value,
      p: btoa(document.getElementById('pw').value)
    }));
  } else {
    localStorage.removeItem('admin_remember');
  }
});

// Show biometric button if WebAuthn is supported
if(window.PublicKeyCredential){
  document.getElementById('bio-section').style.display='';
  // Detect platform authenticator type (face vs fingerprint is OS-level, we just show generic label)
  if(PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
      if(!ok) document.getElementById('bio-section').style.display='none';
    });
  }
}

async function doBioLogin(){
  const btn=document.getElementById('bio-btn');
  btn.disabled=true;
  bioMsg('正在驗證...');
  // Use username from input if filled, otherwise let server return all credentials
  const username=document.getElementById('un').value.trim()||null;
  try{
    const beginRes=await fetch('/api/webauthn/auth/begin',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username})
    });
    if(!beginRes.ok){const d=await beginRes.json();bioMsg(d.error||'找不到已綁定的裝置','err');return;}
    const opts=await beginRes.json();
    // Convert base64url → ArrayBuffer
    opts.challenge=b64url2buf(opts.challenge);
    if(opts.allowCredentials){
      opts.allowCredentials=opts.allowCredentials.map(c=>({...c,id:b64url2buf(c.id)}));
    }
    const cred=await navigator.credentials.get({publicKey:opts});
    const completeRes=await fetch('/api/webauthn/auth/complete',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        id:cred.id,
        rawId:b2b64url(cred.rawId),
        response:{
          authenticatorData:b2b64url(cred.response.authenticatorData),
          clientDataJSON:b2b64url(cred.response.clientDataJSON),
          signature:b2b64url(cred.response.signature),
          userHandle:cred.response.userHandle?b2b64url(cred.response.userHandle):null
        },
        type:cred.type
      })
    });
    const result=await completeRes.json().catch(()=>({}));
    if(!completeRes.ok){bioMsg(result.error||'伺服器錯誤（'+completeRes.status+'）','err');return;}
    bioMsg('驗證成功，正在跳轉...','ok');
    window.location.href='/admin';
  }catch(e){
    if(e.name==='NotAllowedError'){bioMsg('已取消或逾時','err');}
    else{bioMsg('驗證失敗：'+e.message,'err');}
  }finally{
    btn.disabled=false;
  }
}
</script>
</body>
</html>
